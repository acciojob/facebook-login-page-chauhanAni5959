<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- Left Side: Branding -->
        <div class="content-left">
            <h1 class="fb-logo">facebook</h1>
            <p class="fb-tagline">Facebook helps you connect and share with the people in your life.</p>
        </div>

        <!-- Right Side: Login Card -->
        <div class="content-right">
            <div class="login-card">
                <form id="loginForm">
                    <input type="text" id="email" placeholder="Email address or phone number" required>
                    <input type="password" id="pass" placeholder="Password" required>
                    <button type="submit" class="btn-login">Log in</button>
                    <a href="#" class="forgot-link">Forgotten account?</a>
                    <hr>
                    <button type="button" class="btn-new-account">Create new account</button>
                </form>
            </div>
            <p class="footer-text"><b>Create a Page</b> for a celebrity, brand or business.</p>
        </div>
    </div>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
